<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MineRadio 手机版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="player-container">
        
        <div class="background-blur" id="bg-blur"></div>
        
        <header class="player-header">
            <button class="nav-btn"><i class="fas fa-chevron-down"></i></button>
            <div class="song-info">
                <h1 id="song-title">正在加载...</h1>
                <p id="song-artist">歌手名</p>
            </div>
            <button class="nav-btn"><i class="fas fa-share-alt"></i></button>
        </header>

        <main class="player-body">
            <div class="disc-container">
                <div class="cover-stylus" id="stylus"></div>
                <div class="disc" id="disc">
                    <img src="https://picsum.photos/400" alt="Cover" id="cover-img">
                </div>
            </div>
            <div class="lyric-summary">
                <p id="current-lyric">MineRadio - 随身音乐电台</p>
            </div>
        </main>

        <footer class="player-footer">
            <div class="progress-container">
                <span class="time" id="current-time">00:00</span>
                <div class="progress-bar-wrapper" id="progress-wrapper">
                    <div class="progress-bar" id="progress-bar"></div>
                    <div class="progress-dot" id="progress-dot"></div>
                </div>
                <span class="time" id="total-time">00:00</span>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="play-mode" title="循环模式"><i class="fas fa-repeat"></i></button>
                <button class="ctrl-btn" id="prev-btn" title="上一首"><i class="fas fa-step-backward"></i></button>
                <button class="ctrl-btn play-main" id="play-btn" title="播放/暂停"><i class="fas fa-play"></i></button>
                <button class="ctrl-btn" id="next-btn" title="下一首"><i class="fas fa-step-forward"></i></button>
                <button class="ctrl-btn" id="playlist-btn" title="播放列表"><i class="fas fa-list-ul"></i></button>
            </div>
        </footer>
    </div>

    <div class="playlist-drawer" id="playlist-drawer">
        <div class="drawer-header">
            <h3>当前播放列表 (<span id="playlist-count">0</span>)</h3>
            <button id="close-drawer"><i class="fas fa-times"></i></button>
        </div>
        <ul class="music-list" id="music-list">
            </ul>
    </div>
    <div class="drawer-overlay" id="drawer-overlay"></div>

    <audio id="audio-element"></audio>

    <script src="app.js"></script>
</body>
</html>
